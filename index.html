<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img id="main-img" src="https://i.ibb.co/xqQwgBwS/IMG-3900.gif">
        <h1>من خۆشەوێت؟</h1>
        <div class="buttons">
            <button id="yes-btn">بەڵێ</button>
            <button id="no-btn">نەخێر</button>
        </div>
        
        <!-- بەشی دیارییەکە -->
        <div id="gift-section" style="display: none; text-align: center; margin-top: 20px;">
            <h3>منیش زۆرم خۆشەوێیت ! ❤️</h3>
            <button id="play-music-btn" style="padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #ff4d6d; color: white; border: none; border-radius: 5px;">
                کلیک بکە بۆ گوێگرتن لە گۆرانییەکە 🎵
            </button>
            
            <iframe id="youtube-player" width="0" height="0" 
                src="https://www.youtube.com/embed/CMTp8sGQxQI?enablejsapi=1" 
                frameborder="0" allow="autoplay">
            </iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
